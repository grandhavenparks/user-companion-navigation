name: user_companion_navigation_app
description: Offline-first mobile app for terrain forest navigation to flagged trees.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  file_picker: ^11.0.2
  permission_handler: ^11.1.0
  uuid: ^4.2.2
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  flutter_map_tile_caching: ^9.0.1
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/sample/
    - parks/
    - points/
    - assets/tiles/
